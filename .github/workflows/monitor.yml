name: SKBB News Monitor

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Dify and extract HTML
        run: |
          python3 << 'EOF'
          import urllib.request
          import json

          api_key = "${{ secrets.DIFY_API_KEY }}"
          print(f"API 키 앞 10자리: {api_key[:10]}")

          url = "https://api.dify.ai/v1/workflows/run"

          payload = json.dumps({
              "inputs": {"run_type": "scheduled"},
              "response_mode": "streaming",
              "user": "github-actions"
          }).encode('utf-8')

          req = urllib.request.Request(
              url,
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
          )

          html_report = None
          with urllib.request.urlopen(req, timeout=300) as resp:
              for line in resp:
                  line = line.decode('utf-8').strip()
                  if not line.startswith('data:'):
                      continue
                  data_str = line[5:].strip()
                  if not data_str or data_str == '[DONE]':
                      continue
                  try:
                      data = json.loads(data_str)
                      event = data.get('event', '')
                      if event == 'workflow_finished':
                          outputs = data.get('data', {}).get('outputs', {})
                          html_report = outputs.get('html_report')
                          print(f"완료! HTML 길이: {len(html_report) if html_report else 0}")
                          break
                  except json.JSONDecodeError:
                      continue

          if html_report:
              with open('report.html', 'w', encoding='utf-8') as f:
                  f.write(html_report)
              print("report.html 저장 완료!")
          else:
              print("html_report를 찾지 못했습니다.")
              exit(1)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html
          git diff --staged --quiet || git commit -m "update: news report $(date +'%Y-%m-%d %H:%M KST')"
          git push
